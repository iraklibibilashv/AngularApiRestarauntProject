<div class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <a routerLink="/" class="auth-logo">
      <div class="logo-mark">SR</div>
      <span class="logo-text">STEP<br><em>RESTAURANT</em></span>
    </a>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your account</p>

    <form class="auth-form" (ngSubmit)="onLogin()">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            placeholder="your@email.com"
            [(ngModel)]="user.email"
            name="email"
            class="form-input"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="user.password"
            name="password"
            class="form-input"
            required
          />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error message -->
      <p class="auth-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <!-- Submit -->
      <button type="submit" class="btn-auth" [disabled]="isLoading" (click)="onLogin()">
        <span *ngIf="!isLoading"  >Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>

    <p class="auth-switch">
      Don't have an account?
      <a routerLink="/register">Sign Up</a>
    </p>

  </div>

  <!-- Background decoration -->
  <div class="auth-bg">
    <div class="auth-bg__circle auth-bg__circle--1"></div>
    <div class="auth-bg__circle auth-bg__circle--2"></div>
  </div>

</div>

<div class="auth-page">
  <div class="auth-card">

    <a routerLink="/" class="auth-logo">
      <div class="logo-mark">SR</div>
      <span class="logo-text">STEP<br><em>RESTAURANT</em></span>
    </a>

    <!-- ══ STEP 1: Enter Email ══ -->
    @if (step === 1) {
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-sub">Enter your email to receive a reset code</p>

      <form class="auth-form" (ngSubmit)="onForgot()">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              placeholder="your@email.com"
              [(ngModel)]="email"
              name="email"
              class="form-input"
              required
            />
          </div>
        </div>

        <p class="auth-error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <button type="submit" class="btn-auth" [disabled]="isLoading">
          <span *ngIf="!isLoading">Send Reset Code</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </form>
    }

    <!-- ══ STEP 2: Reset Password ══ -->
    @if (step === 2) {
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter the token from your email and new password</p>

      <form class="auth-form" (ngSubmit)="onReset()">

        <!-- Token -->
        <div class="form-group">
          <label class="form-label">Reset Token</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="text"
              placeholder="Paste token from email..."
              [(ngModel)]="resetToken"
              name="token"
              class="form-input"
              required
            />
          </div>
        </div>

        <!-- New Password -->
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="New password..."
              [(ngModel)]="newPassword"
              name="newPassword"
              class="form-input"
              required
            />
            <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="auth-error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <button type="submit" class="btn-auth" [disabled]="isLoading">
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

        <button type="button" class="btn-back" (click)="step = 1">← Back</button>

      </form>
    }

    <p class="auth-switch">
      Remember your password? <a routerLink="/login">Sign In</a>
    </p>

  </div>
  <div class="auth-bg">
    <div class="auth-bg__circle auth-bg__circle--1"></div>
    <div class="auth-bg__circle auth-bg__circle--2"></div>
  </div>
</div>

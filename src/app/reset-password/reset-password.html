<div class="auth-page">
  <div class="auth-card">

    <a routerLink="/" class="auth-logo">
      <div class="logo-mark">SR</div>
      <span class="logo-text">STEP<br><em>RESTAURANT</em></span>
    </a>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-sub">Enter the token from your email and your new password</p>

    <form class="auth-form" (ngSubmit)="onReset()">

      <!-- Token -->
      <div class="form-group">
        <label class="form-label">Reset Token</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="text"
            placeholder="Paste token from email..."
            [(ngModel)]="resetData.token"
            name="token"
            class="form-input"
            required
          />
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="resetData.newPassword"
            name="newPassword"
            class="form-input"
            required
          />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="auth-error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" class="btn-auth" [disabled]="isLoading">
        <span *ngIf="!isLoading">Reset Password</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>

    <p class="auth-switch">
      <a routerLink="/forgot-password">← Back</a>
    </p>

  </div>

  <div class="auth-bg">
    <div class="auth-bg__circle auth-bg__circle--1"></div>
    <div class="auth-bg__circle auth-bg__circle--2"></div>
  </div>
</div>
